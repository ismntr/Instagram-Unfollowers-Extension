<!DOCTYPE html>
<html>
<head>
    <title>Instagram Unfollow Core</title>
    <style>
        body {
            width: 240px;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
        }
        h3 {
            margin-top: 0;
            text-align: center;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        #startBtn { background-color: #0095f6; }
        #startBtn:disabled { background-color: #b2dffc; cursor: not-allowed; }
        #stopBtn { background-color: #ed4956; }
        #stopBtn:disabled { background-color: #f7a8b8; cursor: not-allowed; }
        
        .stats {
            margin-top: 15px;
            font-size: 13px;
            line-height: 1.8;
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dbdbdb;
        }
        .status-running { color: #0095f6; font-weight: bold; }
        .status-stopped { color: #ed4956; font-weight: bold; }
        .status-paused { color: #f5a623; font-weight: bold; }
        
        .file-upload {
            margin: 15px 0;
            font-size: 13px;
        }
        .file-upload input {
            margin-top: 5px;
            width: 100%;
        }
    </style>
</head>
<body>
    <h3>IG Direct Unfollow</h3>
    
    <div class="stats">
        <div>Status: <span id="statusText" class="status-stopped">Stopped</span></div>
        <div>Target Queue: <span id="targetCount">0</span></div>
        <div>Unfollowed: <span id="processedCount">0</span></div>
    </div>

    <div class="file-upload">
        <label for="csvUpload">Upload CSV (Usernames):</label>
        <input type="file" id="csvUpload" accept=".csv">
    </div>

    <button id="startBtn">Start Engine</button>
    <button id="stopBtn" disabled>Stop Engine</button>

    <script src="popup.js"></script>
</body>
</html>
